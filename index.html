<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anishka ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

.container {
    position: relative;
    top: 30%;
    z-index: 2;
}

h1 {
    font-size: 3em;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 1.2em;
    margin-top: 20px;
    animation: fadeIn 4s ease-in-out;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 1em;
    border: none;
    border-radius: 25px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
}

.hidden {
    display: none;
    margin-top: 20px;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Floating Hearts */
.heart {
    position: absolute;
    color: pink;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- Hidden YouTube Music -->
<iframe id="musicFrame" width="0" height="0"
src=""
frameborder="0" allow="autoplay"></iframe>

<div class="container">
    <h1>Anishka ❤️</h1>
    <p>I made this just for you...</p>

    <button onclick="startExperience()">Click Me</button>

    <div id="mainMsg" class="hidden">
        <h2>I'm Sorry 💔</h2>
        <p>
        I know I messed up...  
        And I hate that I hurt you.  

        You mean everything to me, Anishka.  
        I’m not perfect, but I truly want to fix things.  

        Please give me one chance... ❤️
        </p>
    </div>
</div>

<script>
function startExperience() {

    // Start Music
    document.getElementById("musicFrame").src =
    "https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&loop=1&playlist=2Vv-BfVoq4g";

    // Show Message
    document.getElementById("mainMsg").style.display = "block";
}

/* Floating Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}, 300);
</script>

</body>
</html>
